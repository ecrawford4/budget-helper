name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build package
        run: .\mvnw.cmd -q -DskipTests package
        shell: pwsh

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: target/budget-helper-1.0.0.jar
